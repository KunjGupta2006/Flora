<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Flora</title>
</head>
<body>
    
<header class="main-header">
    <div class="logo">FLORA.</div>
    
    <nav class="bottom-nav" aria-label="Main Navigation">
        <a href="#" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </a>
        <a href="#environment" class="nav-item">
            <span class="nav-icon">🌱</span>
            <span class="nav-label">Shop</span>
        </a>
        <a href="#wishlist" class="nav-item">
            <span class="nav-icon">♥</span>
            <span class="nav-label">Wishlist</span>
        </a>
        <a href="#cart" class="nav-item">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Cart</span>
        </a>
    </nav>

    <div class="theme-utility">
        <button id="theme-toggle" aria-label="Toggle theme">☀️</button>
    </div>
</header>

<main>
    <aside class="filters-sidebar">
        <h3>Filters</h3>
        </aside>

    <section id="environment" class="products-section">
        <h2>Our Environment</h2>
        
        <div class="products-grid">
            
            <article class="card-div">
                <div class="card-img-wrapper">
                    <img src="https://images.unsplash.com/photo-1545241047-6083a3684587?auto=format&fit=crop&w=300&q=80" alt="Snake Plant in terracotta pot" />
                </div>
                
                <div class="card-bottom">
                    <div class="card-bleft">
                        <h3 class="card-title">Snake Plant</h3>
                        <p class="card-desc">Low light, air purifying</p>
                    </div>
                    
                    <div class="card-bright">
                        <p class="item-price">$24</p>
                        <div class="cart-qty">
                            <button class="item-qty-btn btn-decrement" aria-label="Decrease quantity">-</button>
                            <p class="item-qty-input" aria-label="Quantity"> </p>
                            <button class="item-qty-btn btn-increment" aria-label="Increase quantity">+</button>
                        </div>
                    </div>
                </div>
            </article>

        </div>
    </section>
</main>

<footer class="main-footer">
    <p>&copy; 2026 FLORA. All rights reserved.</p>
</footer>

</body>
</html>
